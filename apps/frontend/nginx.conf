server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Backend API — strips /api prefix ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── MetaSeal — main app (strips /apps/metaseal prefix) ───────────────────
    location /apps/metaseal/ {
        proxy_pass            http://metaseal:8000/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_hide_header     X-Frame-Options;
        proxy_hide_header     Content-Security-Policy;
        add_header            X-Frame-Options   "";
        client_max_body_size  500m;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # ── MetaSeal — API endpoints called by its own JS (root-relative fetch) ──
    # The static HTML does fetch("/embed") and fetch("/detect"), so we must
    # proxy those root-level paths to the metaseal service as well.
    location /embed {
        proxy_pass            http://metaseal:8000/embed;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        client_max_body_size  500m;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    location /detect {
        proxy_pass            http://metaseal:8000/detect;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        client_max_body_size  500m;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
